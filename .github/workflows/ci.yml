name: StadiumSaathi CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  client:
    name: Client CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js v18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Lint code
        run: npm run lint
        working-directory: client

      - name: TypeScript validation
        run: npx tsc --noEmit
        working-directory: client

      - name: Run unit tests
        run: npm run test
        working-directory: client

      - name: Build assets
        run: npm run build
        working-directory: client

  server:
    name: Server CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js v18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Run unit tests
        run: NODE_ENV=test GEMINI_API_KEY=dummy GOOGLE_MAPS_API_KEY=dummy npx jest
        working-directory: server
